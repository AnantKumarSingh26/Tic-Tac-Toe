<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-Tac-Toe</title>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="https://cdn.jsdelivr.net/npm/remixicon@4.9.1/icons/Device/gamepad-fill.svg" type="image/x-icon">
</head>
<body>
    <nav>
        <ul>
            <li>MyTicTacToe.com</li>
        </ul>
    </nav>
    <div class="gameContainer">
        <div class="container">
            <div class="box bl-0 bt-0"><span class="boxtext">X</span></div>
            <div class="box bt-0"><span class="boxtext">X</span></div>
            <div class="box bt-0 br-0"><span class="boxtext">X</span></div>
            <div class="box bl-0"><span class="boxtext">X</span></div>
            <div class="box "><span class="boxtext">X</span></div>
            <div class="box br-0"><span class="boxtext">X</span></div>
            <div class="box bb-0 bl-0" ><span class="boxtext">X</span></div>
            <div class="box bb-0"><span class="boxtext">X</span></div>
            <div class="box bb-0 br-0"><span class="boxtext">X</span></div>
        </div>
        <div class="gameInfo">
            <h1>Welcome to Tic Tac Toe</h1>
            <div>
                <span class="info">
                    Turn For X
                </span>
                <button id="reset">Reset</button>
            </div>
            <div class="image">
                <img src="https://media0.giphy.com/media/v1.Y2lkPWVjZjA1ZTQ3MmRmempsMzRsdXl0ZmtnMXMyc3FieHh2OHEwZnYxNDhjaWk4dXQ4ZyZlcD12MV9naWZzX3NlYXJjaCZjdD1n/ZGBQhaRTHyWtRVn1Xx/200.webp" alt="">
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
